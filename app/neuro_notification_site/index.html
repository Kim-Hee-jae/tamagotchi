<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Neuro-sama is live now</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f5f7;
        --card: #ffffff;
        --ink: #121212;
        --muted: #666;
        --line: #dedede;
        --red: #ff0033;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          radial-gradient(circle at 10% 12%, rgba(255, 0, 51, 0.08), transparent 160px),
          var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .phone {
        width: min(100%, 420px);
        display: grid;
        gap: 14px;
      }

      .status {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        padding-inline: 4px;
      }

      .notification {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in srgb, var(--card) 94%, transparent);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.16);
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 750;
      }

      .play {
        width: 28px;
        height: 20px;
        border-radius: 5px;
        background: var(--red);
        position: relative;
        flex: 0 0 auto;
      }

      .play::after {
        content: "";
        position: absolute;
        left: 11px;
        top: 5px;
        border-left: 8px solid #fff;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
      }

      .body-row {
        display: grid;
        grid-template-columns: 54px 1fr;
        gap: 12px;
      }

      .avatar {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 2px solid var(--line);
        background:
          linear-gradient(135deg, #f7f7f7, #d4fff7),
          #fff;
        position: relative;
        overflow: hidden;
      }

      .avatar::before {
        content: "";
        position: absolute;
        left: 13px;
        top: 12px;
        width: 28px;
        height: 18px;
        border-radius: 999px 999px 4px 4px;
        background: #1d1d1d;
      }

      .avatar::after {
        content: "";
        position: absolute;
        left: 17px;
        top: 29px;
        width: 20px;
        height: 7px;
        border-radius: 999px;
        background: var(--red);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 1.06rem;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .channel,
      .copy,
      .time {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.35;
      }

      .channel {
        color: var(--ink);
        font-weight: 800;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
      }

      .watch {
        min-width: 96px;
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: var(--red);
        color: #fff;
        font-weight: 900;
        cursor: pointer;
      }

      .watch:active {
        transform: scale(0.98);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f0f;
          --card: #202020;
          --ink: #f5f5f5;
          --muted: #a8a8a8;
          --line: #383838;
        }

      }
    </style>
  </head>
  <body>
    <main class="phone">
      <div class="status"><span>9:39</span><span>LIVE · now</span></div>
      <section class="notification" aria-label="YouTube live notification">
        <div class="brand-row"><span class="play" aria-hidden="true"></span><span>YouTube</span></div>
        <div class="body-row">
          <div class="avatar" aria-hidden="true"></div>
          <div>
            <h1>🔴 Neuro-sama is live now</h1>
            <p class="channel">Neuro-sama</p>
            <p class="copy">chat is waiting for you</p>
            <p class="time">LIVE · now</p>
          </div>
        </div>
        <div class="actions">
          <button class="watch" id="watchButton" type="button">WATCH</button>
        </div>
      </section>
    </main>

    <script>
      const MAIN_PWA_URL = "https://tamagotchi68.netlify.app";

      document.getElementById("watchButton").addEventListener("click", () => {
        window.location.href = `${MAIN_PWA_URL}?mode=neuro`;
      });
    </script>
  </body>
</html>
