        saveState();
        renderHall();
        const shell = document.querySelector(".miku360-shell");
        const video = document.querySelector(".miku360-video");
        if (video) {
          video.muted = !state.media?.soundReady;
          video.load();
          video.play().catch(() => setMikuStatus("화면을 한 번 더 터치하면 재생됩니다"));
        }
        if (shell?.requestFullscreen) {
          shell.requestFullscreen().catch(() => setMikuStatus("전체화면이 차단되었습니다. 화면은 계속 재생됩니다."));
        }
        try {
          const orientationApi = window.DeviceOrientationEvent;
          if (orientationApi && typeof orientationApi.requestPermission === "function") {
            const permission = await orientationApi.requestPermission();
            state.hall3.mikuGyroEnabled = permission === "granted";
          } else {
            state.hall3.mikuGyroEnabled = "DeviceOrientationEvent" in window;
          }
        } catch (err) {
          state.hall3.mikuGyroEnabled = false;
        }
        state.hall3.mikuGestureFallback = !state.hall3.mikuGyroEnabled;
        setMikuStatus(state.hall3.mikuGyroEnabled ? "자이로센서로 시점을 움직입니다." : "자이로센서가 꺼져 있어 손가락으로 화면을 움직일 수 있습니다.");
        mountMiku360Soon();
      }

      function enterNeuroLiveExperience() {
        state.hall3.neuroExperienceReady = true;
        state.hall3.neuroEntryPromptOpen = false;
        saveState();
        renderHall();
      }

      function renderChatLine(item) {
        if (item.type === "markup" || item.type === "system") {
          return `<div class="chat-line markup-line"><strong>${escapeHtml(item.who || "generated")}:</strong> ${escapeHtml(item.text || "")}</div>`;
        }
        const isMe = item.who === "you";
        const who = isMe ? "you" : item.who || "viewer";
        return `<div class="chat-line ${isMe ? "me" : ""}"><strong>${escapeHtml(who)}:</strong> ${escapeHtml(item.text || "")}</div>`;
      }

      function renderModal() {
        const root = document.getElementById("modalRoot");
        if (runtime.transition) {
          root.innerHTML = `
            <div class="transition">
              <div class="transition-box">
                <strong>${escapeHtml(config.ui.systemTransitionTitle)}</strong>
                <p>${escapeHtml(config.ui.systemTransitionLine1)}</p>
                <p>${escapeHtml(config.ui.systemTransitionLine2)}</p>
              </div>
            </div>
          `;
          return;
        }
        if (shouldShowMediaPrompt()) {
          root.innerHTML = `
            <div class="modal-backdrop">
              <div class="modal" role="dialog" aria-modal="true">
                <h2 class="panel-title">체험 준비가 필요합니다</h2>
                <p class="small-copy">정상적인 체험을 위해 진동, 사운드, 알림 허용이 필요합니다.</p>
                <div class="modal-actions">
                  <button class="action-btn" data-action="media-permission-yes">YES · 허용하고 시작</button>
                  <button class="action-btn secondary" data-action="media-permission-no">NO · 나중에 하기</button>
                </div>
              </div>
            </div>
          `;
          return;
        }
        if (!runtime.modalOpen) {
          root.innerHTML = "";
          return;
        }
        root.innerHTML = `
          <div class="modal-backdrop">
            <div class="modal" role="dialog" aria-modal="true">
              <h2 class="panel-title">${escapeHtml(config.ui.hall5WarningTitle)}</h2>
              <p class="small-copy">${escapeHtml(config.ui.hall5WarningBody)}</p>
              <div class="modal-actions">
                <button class="action-btn danger" data-action="confirm-rupture">${escapeHtml(config.ui.hall5EnterButton)}</button>
                <button class="action-btn secondary" data-action="cancel-rupture">${escapeHtml(config.ui.hall5ReturnButton)}</button>
              </div>
            </div>
          </div>
        `;
      }

      function shouldShowMediaPrompt() {
        return state.phase === "normal" &&
          state.currentHall === 2 &&
          !state.media?.promptAnswered &&
          !runtime.modalOpen &&
          !runtime.transition;
      }

      function renderPopup() {
        const root = document.getElementById("popupRoot");
        if (!shouldShowTamaPopup()) {
          root.innerHTML = "";
          return;
        }
        if (!state.tama.popupNeed) {
          state.tama.popupNeed = randomTamaNeed();
          state.tama.popupMessage = tamaRequestText(state.tama.popupNeed);
        }
        const actions = (config.tamagotchi.actions || ["밥", "불 끄기", "놀아주기", "똥 치우기", "닫기"]).filter((action) => action !== "닫기");
        const popupLocked = Boolean(state.tama.popupFeedback);
        const popupMood = state.tama.popupFeedback === "success" ? "happy" : state.tama.popupFeedback === "wrong" ? "angry" : "";
        const showPopupPoop = state.tama.popupNeed === "TOILET" && state.tama.popupFeedback !== "success";
        root.innerHTML = `
          <aside class="tama-popup ${popupLocked ? "resolved" : ""}" aria-live="assertive">
            <button class="popup-close" data-popup-action="닫기" aria-label="닫기" ${popupLocked ? "disabled" : ""}>×</button>
            <div class="popup-grid">
              <div class="mini-lcd"><div class="pixel-stage">${showPopupPoop ? `<div class="pixel-poop" aria-hidden="true"></div>` : ""}<div class="pixel-being ${popupMood}"></div></div></div>
              <div>
                <strong>${escapeHtml(config.tamagotchi.popupTitle)}</strong>
                <p class="small-copy">${escapeHtml(state.tama.popupMessage || tamaRequestText(state.tama.popupNeed))}</p>
              </div>
            </div>
            <div class="popup-actions">
              ${actions.map((action) => `<button data-popup-action="${escapeHtmlAttr(action)}" ${popupLocked ? "disabled" : ""}>${escapeHtml(action)}</button>`).join("")}
            </div>
          </aside>
        `;
      }

      function handleClick(event) {
        const move = event.target.closest("[data-move]");
        if (move) {
          navigateTo(move.dataset.move === "exit" ? "exit" : Number(move.dataset.move));
          return;
        }

        const tamaButton = event.target.closest("[data-tama]");
        if (tamaButton) {
          handleTamaButton(tamaButton.dataset.tama);
          return;
        }

        const popupButton = event.target.closest("[data-popup-action]");
        if (popupButton) {
          handlePopupAction(popupButton.dataset.popupAction);
          return;
        }

        const rashomonSuggestion = event.target.closest("[data-rashomon-suggest]");
        if (rashomonSuggestion) {
          sendRashomonMessage(rashomonSuggestion.dataset.rashomonSuggest);
          return;
        }

        const cheerButton = event.target.closest("[data-cheer]");
        if (cheerButton) {
          addCheer(cheerButton.dataset.cheer);
          return;
        }

        const action = event.target.closest("[data-action]");
        const ruptureTab = event.target.closest("[data-rupture-tab]");
        if (ruptureTab) {
          state.hall3.ruptureActiveTab = ruptureTab.dataset.ruptureTab;
          if (state.hall3.ruptureActiveTab === "neuro" && !runtime.ruptureChatStartedAt) {
            runtime.ruptureChatStartedAt = Date.now();
            seedNeuroChat();
          }
          saveState();
          render();
          return;
        }

        if (!action) return;

        if (action.dataset.action === "confirm-rupture") enterRuptureLoop();
        if (action.dataset.action === "cancel-rupture") {
          runtime.modalOpen = false;
          render();
        }
        if (action.dataset.action === "media-permission-yes") prepareMediaFeatures();
        if (action.dataset.action === "media-permission-no") {
          state.media = state.media || {};
          state.media.promptAnswered = true;
          state.media.permissionDeclined = true;
          state.media.message = "";
          saveState();
          render();
        }
        if (action.dataset.action === "retry-sound") retrySoundPlayback();
        if (action.dataset.action === "enter-miku360") enterMiku360Experience();
        if (action.dataset.action === "enter-neuro-live") enterNeuroLiveExperience();
        if (action.dataset.action === "play-rupture-miku") {
          state.hall3.ruptureMikuPlaying = true;
          saveState();
          renderHall();
        }
        if (action.dataset.action === "exit-focus") {
          state.hall3.focusMode = "both";
          saveState();
          render();
        }
      }

      function handleSubmit(event) {
        const form = event.target.closest("form[data-form]");
        if (!form) return;
        event.preventDefault();
        if (form.dataset.form === "exit-card") {
          submitExitCard(form);
          return;
        }
        const input = form.elements.message;
        const message = (input.value || "").trim();
        if (!message) return;
        input.value = "";

        if (form.dataset.form === "neuro") sendNeuroMessage(message);
        if (form.dataset.form === "rashomon") sendRashomonMessage(message);
        if (form.dataset.form === "simsimi") sendSimsimiMessage(message);
        if (form.dataset.form === "rupture-neuro") sendRuptureNeuroMessage(message);
      }

      function navigateTo(hall) {
        if (!getAvailableMoves().includes(hall)) return;
        if (hall === 5) {
          runtime.modalOpen = true;
          render();
          return;
        }
        if (hall === "exit" && !(state.phase === "rupture" && state.currentHall === 4)) return;
        state.currentHall = hall;
        if (!(state.phase === "rupture" && hall === 3)) {
          runtime.ruptureHall3EnteredAt = null;
          runtime.ruptureChatStartedAt = null;
        }
        if (state.phase === "rupture" && hall === 3) {
          runtime.ruptureHall3EnteredAt = Date.now();
          state.hall3.ruptureActiveTab = state.hall3.ruptureActiveTab || "miku";
        }
        if (state.phase === "normal" && hall === 3) {
          state.hall3.focusMode = "both";
        }
        if (state.phase === "normal" && [3, 4].includes(hall)) {
          prepareTamaPopup();
          vibrateDevice(config.tamagotchi.vibrationPattern || [80, 40, 80]);
        }
        saveState();
        render();
      }

      function handleTamaButton(button) {
        if (state.phase === "rupture" && state.currentHall === 2) {
          if (button === "A") {
            state.tama.selectedIconIndex = (state.tama.selectedIconIndex + 1) % TAMA_ICONS.length;
          }
          if (button === "C") {
            state.tama.selectedIconIndex = 0;
          }
          saveState();
          render();
          return;
        }
        if (state.phase !== "normal" || state.tama.silent) return;
        if (button === "A") {
          state.tama.selectedIconIndex = (state.tama.selectedIconIndex + 1) % TAMA_ICONS.length;
        }
        if (button === "B") {
          const icon = TAMA_ICONS[state.tama.selectedIconIndex];
          resolveTamaNeed(icon);
          return;
        }
        if (button === "C") {
          restoreTamaRequestSoon();
        }
        refreshAfterTamaChange({ refocusNeuro: true });
      }

      function isNeuroLiveVisible() {
        return state.phase === "normal" && state.currentHall === 3 && state.hall3.neuroLive;
      }

      function refreshAfterTamaChange({ refocusNeuro = false } = {}) {
        saveState();
        if (isNeuroLiveVisible()) {
          renderPopup();
          updateNeuroChatLog({ refocus: refocusNeuro });
          return;
        }
        if (state.phase === "normal" && state.currentHall === 4) {
          renderPopup();
          return;
        }
        render();
      }

      function resolveTamaNeed(icon) {
        ensureTamaNeed();
        if (icon === state.tama.currentNeed) {
          state.tama.happy = clamp(state.tama.happy + 1, 0, 5);
          state.tama.displayMessage = config.tamagotchi.successMessage || "( ≧ ◡ ≦ )";
          state.tama.displayMode = "success";
          state.tama.lastCareAction = icon.toLowerCase();
          refreshAfterTamaChange({ refocusNeuro: true });
          setTimeout(() => {
            if (state.phase !== "normal") return;
            state.tama.currentNeed = randomTamaNeed();
            state.tama.displayMessage = tamaRequestText(state.tama.currentNeed);
            state.tama.displayMode = "request";
            refreshAfterTamaChange({ refocusNeuro: true });
          }, 1000);
          return;
        }
        state.tama.happy = clamp(state.tama.happy - 1, 0, 5);
        state.tama.displayMessage = config.tamagotchi.wrongMessage || "그게 아니야!";
        state.tama.displayMode = "wrong";
        refreshAfterTamaChange({ refocusNeuro: true });
        restoreTamaRequestSoon();
      }

      function restoreTamaRequestSoon() {
        setTimeout(() => {
          if (state.phase !== "normal") return;
          state.tama.displayMessage = tamaRequestText(state.tama.currentNeed);
          state.tama.displayMode = "request";
          refreshAfterTamaChange({ refocusNeuro: true });
        }, 1000);
      }

      function openTamaPopup() {
        if (state.phase !== "normal" || state.tama.silent || ![3, 4].includes(state.currentHall) || state.tama.popupOpen) return;
        prepareTamaPopup();
        vibrateDevice(config.tamagotchi.vibrationPattern || [80, 40, 80]);
        saveState();
        renderPopup();
      }

      function prepareTamaPopup() {
        if (state.phase !== "normal" || state.tama.silent || ![3, 4].includes(state.currentHall) || state.tama.popupOpen) return;
        state.tama.callCount += 1;
        state.tama.popupOpen = true;
        state.tama.popupNeed = randomTamaNeed();
        state.tama.popupMessage = tamaRequestText(state.tama.popupNeed);
        state.tama.popupResolved = false;
        state.tama.popupFeedback = "";
      }

      function shouldShowTamaPopup() {
        return state.phase === "normal" && state.tama.popupOpen && !state.tama.silent && [3, 4].includes(state.currentHall);
      }

      function handlePopupAction(action) {
        const mapped = (config.tamagotchi.actionMap || {})[action] || "";
        if (mapped && mapped === state.tama.popupNeed) {
          state.tama.happy = clamp(state.tama.happy + 1, 0, 5);
          state.tama.popupMessage = config.tamagotchi.successMessage || "( ≧ ◡ ≦ )";
          state.tama.popupResolved = true;
          state.tama.popupFeedback = "success";
          saveState();
          renderPopup();
          setTimeout(() => {
            state.tama.popupOpen = false;
            state.tama.popupNeed = "";
            state.tama.popupMessage = "";
            state.tama.popupResolved = false;
            state.tama.popupFeedback = "";
            refreshAfterTamaChange({ refocusNeuro: true });
          }, 1000);
          return;
        }
        state.tama.happy = clamp(state.tama.happy - 1, 0, 5);
        state.tama.popupMessage = config.tamagotchi.popupWrongMessage || "(´；д；`)";
        state.tama.popupResolved = false;
        state.tama.popupFeedback = "wrong";
        saveState();
        renderPopup();
        setTimeout(() => {
          state.tama.popupOpen = false;
          state.tama.popupNeed = "";
          state.tama.popupMessage = "";
          state.tama.popupResolved = false;
          state.tama.popupFeedback = "";
          refreshAfterTamaChange({ refocusNeuro: true });
        }, 1000);
      }

      function randomTamaNeed() {
        return TAMA_ICONS[Math.floor(Math.random() * TAMA_ICONS.length)];
      }

      function tamaRequestText(icon) {
        return (config.tamagotchi.requests || {})[icon] || "";
      }

      async function prepareMediaFeatures() {
        state.media = state.media || {};
        state.media.soundOverlayDismissed = false;
        let pushReady = false;
        if (config.push?.enableWebPush) {
          try {
            pushReady = await startWebPush();
          } catch (err) {
            pushReady = false;
          }
        }
        state.media.vibrationReady = vibrateDevice([60, 30, 60]);
        state.media.soundReady = await unlockAudio();
        state.media.ready = true;
        state.media.promptAnswered = true;
        state.media.permissionDeclined = false;
        state.media.message = `진동 및 사운드 준비 완료. ${config.push?.enableWebPush && !pushReady ? "알림 연결은 브라우저/서버 설정에 따라 실패할 수 있습니다. " : ""}브라우저 정책상 소리가 막히면 화면을 한 번 눌러주세요.`;
        try {
          localStorage.setItem("mediaReady", "true");
          localStorage.setItem("mediaPromptAnswered", "true");
          localStorage.setItem("soundReady", String(state.media.soundReady));
          localStorage.setItem("vibrationReady", String(state.media.vibrationReady));
        } catch (err) {
          console.warn("media ready save failed", err);
        }
        saveState();
        render();
      }

      async function retrySoundPlayback() {
        state.media = state.media || {};
        const unlocked = await unlockAudio();
        state.media.soundReady = true;
        state.media.ready = true;
        state.media.soundOverlayDismissed = !unlocked;
        state.media.message = unlocked ? "사운드 재생을 다시 시도합니다." : "브라우저가 소리를 막았습니다. 영상 화면을 직접 눌러 재생해 주세요.";
        try {
          localStorage.setItem("soundReady", String(state.media.soundReady));
          localStorage.setItem("mediaReady", "true");
        } catch (err) {
          console.warn("sound retry save failed", err);
        }
        saveState();
        render();
      }

      function vibrateDevice(pattern) {
        try {
          if (!navigator.vibrate) return false;
          return Boolean(navigator.vibrate(pattern));
        } catch (err) {
          return false;
        }
      }

      async function unlockAudio() {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return false;
          const context = new AudioContextClass();
          if (context.state === "suspended") await context.resume();
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          gain.gain.value = 0.00001;
          oscillator.connect(gain);
          gain.connect(context.destination);
          oscillator.start();
          oscillator.stop(context.currentTime + 0.03);
          return true;
        } catch (err) {
          return false;
        }
      }

      async function startWebPush() {
        if (!("serviceWorker" in navigator) || !("PushManager" in window)) return false;
        const apiBase = config.push?.apiBase || config.main.apiBase;
        const publicKey = await fetchVapidPublicKey(apiBase);
        if (!publicKey) return false;
        const registration = await navigator.serviceWorker.ready;
        const permission = await Notification.requestPermission();
        if (permission !== "granted") return false;
        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey)
        });
        await fetch(`${apiBase}/subscribe`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId: state.sessionId, subscription })
        });
        await fetch(`${apiBase}/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId: state.sessionId, intervalSeconds: 30 })
        });
        return true;
      }

      async function fetchVapidPublicKey(apiBase) {
        try {
          const res = await fetch(`${apiBase}/vapid-public-key`, { cache: "no-store" });
          const data = await res.json();
          return data.publicKey || config.push?.vapidPublicKey || "";
        } catch (err) {
          return config.push?.vapidPublicKey || "";
        }
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
        const rawData = atob(base64);
        return Uint8Array.from([...rawData].map((char) => char.charCodeAt(0)));
      }

      function addCheer(text) {
        runtime.cheers.push({ text, ts: Date.now() });
        state.hall3.mikuCheerLog.push({ text, at: new Date().toISOString() });
        state.hall3.mikuCheerLog = state.hall3.mikuCheerLog.slice(-24);
        saveState();
        render();
        setTimeout(render, 1800);
      }

      function seedNeuroChat() {
        if (state.hall3.neuroChatLog.length) return;
        state.hall3.neuroChatLog = config.neuro.normalChats.slice(0, 4).map((text, index) => ({
          who: `viewer_${String(102 + index * 37).padStart(3, "0")}`,
          text
        }));
      }

      function neuroVisibleChatLines() {
        return state.hall3.neuroChatLog
          .filter((item) => item.type !== "markup" && item.type !== "system")
          .slice(-9)
          .map(renderChatLine)
          .join("");
      }

      function updateNeuroChatLog({ refocus = false } = {}) {
        const log = document.querySelector(".neuro-chat-log");
        if (log) {
          log.innerHTML = neuroVisibleChatLines();
          log.scrollTop = log.scrollHeight;
        }
        if (refocus) {
          const input = document.querySelector(".neuro-chat-input");
          if (input) input.focus({ preventScroll: true });
        }
      }

      function ruptureNeuroVisibleChatLines() {
        return state.hall3.neuroChatLog
          .slice(-12)
          .map(renderChatLine)
          .join("");
      }

      function ruptureNeuroViewersText() {
        const hasGeneratedChat = state.hall3.neuroChatLog.some((item) => item.type === "markup" || item.who === "generated");
        const viewers = 12400 + ((Date.now() / 1000) | 0) % 220;
        return hasGeneratedChat ? "1 watching" : `${viewers.toLocaleString("ko-KR")} watching`;
      }

      function updateRuptureNeuroChat({ refocus = false } = {}) {
        const log = document.querySelector(".rupture-neuro-chat-log");
        if (log) {
          log.innerHTML = ruptureNeuroVisibleChatLines();
          log.scrollTop = log.scrollHeight;
        }
        const viewers = document.querySelector(".rupture-neuro-viewers");
        if (viewers) viewers.textContent = ruptureNeuroViewersText();
        if (refocus) {
          const input = document.querySelector(".rupture-neuro-chat-input");
          if (input) input.focus({ preventScroll: true });
        }
      }

      function addNeuroAutoChat() {
        const normalLive = state.phase === "normal" && state.currentHall === 3 && state.hall3.neuroLive;
        const ruptureLive = state.phase === "rupture" && state.currentHall === 3 && state.hall3.ruptureActiveTab === "neuro";
        if (!normalLive && !ruptureLive) return;

        if (ruptureLive && !runtime.ruptureChatStartedAt) runtime.ruptureChatStartedAt = Date.now();
        const shouldUseMarkup = ruptureLive && shouldAppendMarkupLine();
        if (shouldUseMarkup) {
          const pool = config.neuro.ruptureMarkupChats || [];
          const text = pool[Math.floor(Math.random() * pool.length)] || "<span class=\"red-text\" data-emotion=\"attachment\" data-score=\"0.88\">계속 보고 싶어</span>";
          state.hall3.neuroChatLog.push({ type: "markup", who: "generated", text });
        } else {
          const pool = config.neuro.normalChats;
          const text = pool[Math.floor(Math.random() * pool.length)];
          const who = `viewer_${Math.floor(100 + Math.random() * 899)}`;
          state.hall3.neuroChatLog.push({ who, text });
        }
        state.hall3.neuroChatLog = state.hall3.neuroChatLog.slice(-(Number(config.neuro.maxChatLines) || 80));
        saveState();
        if (normalLive) {
          updateNeuroChatLog();
        } else {
          updateRuptureNeuroChat();
        }
      }

      function shouldAppendMarkupLine() {
        const delay = Number(config.neuro.ruptureMarkupDelayMs || config.neuro.ruptureLogDelayMs) || 2000;
        const elapsed = Date.now() - (runtime.ruptureChatStartedAt || Date.now());
        if (elapsed < delay) return false;
        const probability = elapsed > delay + 6000 ? 0.68 : 0.5;
        return Math.random() < probability;
      }

      function sendNeuroMessage(message) {
        state.hall3.neuroChatLog.push({ who: "you", text: message });
        updateNeuroChatLog({ refocus: true });
        const reaction = config.neuro.neuroLines[Math.floor(Math.random() * config.neuro.neuroLines.length)];
        setTimeout(() => {
          state.hall3.neuroChatLog.push({ who: "Neuro-sama", text: reaction });
          state.hall3.neuroChatLog = state.hall3.neuroChatLog.slice(-36);
          saveState();
          updateNeuroChatLog({ refocus: true });
        }, 650);
        saveState();
        updateNeuroChatLog({ refocus: true });
      }

      async function sendRashomonMessage(message) {
        ensureHall4State();
        if (runtime.chatBusy || Date.now() < runtime.cooldownUntil) return;
        const cleanMessage = String(message || "").trim().slice(0, Number(config.llm.maxInputChars) || 300);
        if (!cleanMessage) return;
        const rashomon = state.hall4.rashomon;
        const maxTurns = Number(rashomon.maxTurns) || Number(config.llm?.rashomon?.maxTurns) || 10;
        if (state.phase === "normal" && rashomon.finalAnswerSubmitted) return;
        if (state.phase === "normal" && rashomon.awaitingFinalAnswer) {
          runtime.chatBusy = true;
          const messages = currentHall4Messages();
          messages.push({ role: "user", text: cleanMessage });
          rashomon.finalAnswer = cleanMessage;
          rashomon.userTheory = cleanMessage;
          rashomon.awaitingFinalAnswer = false;
          rashomon.finalAnswerSubmitted = true;
          rashomon.completedNormal = true;
          messages.push({ role: "assistant", text: "답을 들었습니다. 이제 5관으로 이동해 후일담을 확인하세요." });
          syncHall4LegacyMessages();
          saveState();
          runtime.chatBusy = false;
          render();
          return;
        }
        if (state.phase === "normal" && rashomon.turnCount >= maxTurns) {
          rashomon.awaitingFinalAnswer = true;
          saveState();
          render();
          return;
        }

        runtime.chatBusy = true;
        const messages = currentHall4Messages();
        rashomon.pendingMessage = cleanMessage;
        messages.push({ role: "user", text: cleanMessage });
        let reachedQuestionLimit = false;
        const pendingTurnCount = state.phase === "normal"
          ? Math.min(maxTurns, (Number(rashomon.turnCount) || 0) + 1)
          : Number(rashomon.turnCount) || 0;
        rashomon.lastPhase = state.phase;
        syncHall4LegacyMessages();
        saveState();
        render();

        const body = {
          sessionId: state.sessionId,
          phase: state.phase,
          message: cleanMessage,
          model: config.llm.model,
          maxOutputTokens: Number(config.llm.maxOutputTokens) || 3000,
          memorySummary: state.hall4.memorySummary,
          recentMessages: currentHall4Messages().slice(-8),
          rashomonMemory: rashomonMemoryPayload(),
          turnCount: pendingTurnCount,
          maxTurns
        };

        let requestSucceeded = false;
        try {
          const res = await fetch(`${config.main.apiBase}/api/rashomon/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (!res.ok) throw new Error(`Rashomon API HTTP ${res.status}`);
          const data = await res.json();
          requestSucceeded = true;
          if (state.phase === "normal") {
            rashomon.turnCount = pendingTurnCount;
            reachedQuestionLimit = rashomon.turnCount >= maxTurns;
          }
          if (data.fallback === true) {
            console.warn("Rashomon fallback response", data);
            const debugTag = data.fallbackType ? `\n[debug: ${data.fallbackType}]` : "\n[debug: fallback]";
            currentHall4Messages().push({ role: "assistant", text: `${data.reply || rashomonFallbackReply()}${debugTag}` });
          } else {
            currentHall4Messages().push({ role: "assistant", text: data.reply || rashomonFallbackReply() });
            applyRashomonResponse(data);
          }
        } catch (err) {
          console.error("rashomon chat failed", err);
          currentHall4Messages().push({ role: "assistant", text: "응답 연결이 불안정합니다. 다시 시도해 주세요." });
        } finally {
          rashomon.pendingMessage = "";
          runtime.chatBusy = false;
          runtime.cooldownUntil = Date.now() + (Number(config.llm.chatCooldownMs) || 1000);
          if (requestSucceeded && state.phase === "normal" && reachedQuestionLimit && !rashomon.finalAnswerSubmitted) {
            const currentMessages = currentHall4Messages();
            const finalQuestion = "누구의 말이 진실입니까?";
            const lastMessage = currentMessages[currentMessages.length - 1];
            if (!lastMessage || lastMessage.role !== "assistant" || lastMessage.text !== finalQuestion) {
              currentMessages.push({ role: "assistant", text: finalQuestion });
            }
            rashomon.awaitingFinalAnswer = true;
            rashomon.completedNormal = false;
          }
          state.hall4.normalMessages = state.hall4.normalMessages.slice(-50);
          state.hall4.ruptureMessages = state.hall4.ruptureMessages.slice(-40);
          syncHall4LegacyMessages();
          saveState();
          render();
          setTimeout(render, Number(config.llm.chatCooldownMs) || 1000);
        }
      }

      function rashomonMemoryPayload() {
        const rashomon = state.hall4.rashomon || {};
        return {
          userTheory: rashomon.userTheory || "",
          userBeliefs: rashomon.userBeliefs || [],
          userSuspicions: rashomon.userSuspicions || [],
          sharedClues: rashomon.sharedClues || [],
          pressurePoints: rashomon.pressurePoints || [],
          woodcutterAdmissions: rashomon.woodcutterAdmissions || [],
          woodcutterEvasions: rashomon.woodcutterEvasions || [],
          distortionCandidates: rashomon.distortionCandidates || [],
          distortionPlan: rashomon.distortionPlan || [],
          lastGoal: rashomon.lastGoal || hall4GoalText(),
          lastPhase: rashomon.lastPhase || state.phase
        };
      }

      function applyRashomonResponse(data) {
        const source = data && typeof data === "object" ? data : {};
        if (source.fallback === true) return;
        const rashomon = state.hall4.rashomon;
        state.hall4.memorySummary = source.memorySummary || state.hall4.memorySummary;
        rashomon.userTheory = source.userTheory || rashomon.userTheory || "";
        rashomon.userBeliefs = Array.isArray(source.userBeliefs) ? source.userBeliefs : rashomon.userBeliefs;
        rashomon.userSuspicions = Array.isArray(source.userSuspicions) ? source.userSuspicions : rashomon.userSuspicions;
        rashomon.sharedClues = Array.isArray(source.sharedClues) ? source.sharedClues : rashomon.sharedClues;
        rashomon.pressurePoints = Array.isArray(source.pressurePoints) ? source.pressurePoints : rashomon.pressurePoints;
        rashomon.woodcutterAdmissions = Array.isArray(source.woodcutterAdmissions) ? source.woodcutterAdmissions : rashomon.woodcutterAdmissions;
        rashomon.woodcutterEvasions = Array.isArray(source.woodcutterEvasions) ? source.woodcutterEvasions : rashomon.woodcutterEvasions;
        rashomon.distortionCandidates = Array.isArray(source.distortionCandidates) ? source.distortionCandidates : rashomon.distortionCandidates;
        rashomon.distortionPlan = Array.isArray(source.distortionPlan) ? source.distortionPlan : rashomon.distortionPlan;
        rashomon.lastGoal = source.goalText || hall4GoalText();
        rashomon.lastPhase = state.phase;
        if (source.shouldEnd && state.phase === "normal" && !rashomon.awaitingFinalAnswer) {
          rashomon.completedNormal = true;
        }
      }

      function rashomonFallbackReply() {
        if (state.phase === "rupture") {
          return "이상하네요. 분명 당신은 반대쪽을 짚어 주셨고, 재판에서는 그 사람이 범인으로 잡혀갔습니다. 기억이 조금 흐려지신 건 아닐까요?";
        }
        if ((state.hall4.rashomon?.turnCount || 0) >= (state.hall4.rashomon?.maxTurns || 10)) {
          return "이제 당신의 추측을 들려줄 차례입니다. 이 사건에서 가장 믿기 어려운 말은 누구의 말이었습니까?";
        }
        return "저는 숲에서 본 것을 다 말했다고 생각했는데… 자꾸 빠진 장면이 떠오릅니다. 당신은 누구의 말이 가장 이상하다고 보십니까?";
      }

      function sendSimsimiMessage(message) {
        if (state.phase === "rupture") {
          const script = Array.isArray(config.simsimi.ruptureScript) ? config.simsimi.ruptureScript : [];
          const currentLine = script[state.hall1.scriptIndex];
          if (!currentLine) return;
          state.hall1.messages.push(
            { role: "user", text: currentLine.user },
            { role: "assistant", text: currentLine.reply }
          );
          state.hall1.scriptIndex += 1;
          state.hall1.messages = state.hall1.messages.slice(-22);
          saveState();
          render();
          return;
        }
        const reply = simsimiReply(message);
        state.hall1.messages.push({ role: "user", text: message }, { role: "assistant", text: reply });
        state.hall1.messages = state.hall1.messages.slice(-22);
        saveState();
        render();
      }

      function simsimiReply(message) {
        const has = (words) => words.some((word) => message.includes(word));
        if (has(config.simsimi.memoryKeywords)) return config.simsimi.memoryReply;
        if (has(config.simsimi.detailKeywords)) return config.simsimi.detailReply;
        if (has(config.simsimi.denyKeywords)) return config.simsimi.denyReply;
        const fallbacks = config.simsimi.fallbackReplies;
        return fallbacks[Math.floor(Math.random() * fallbacks.length)];
      }

      function sendRuptureNeuroMessage(message) {
        state.hall3.neuroChatLog.push({
          type: "markup",
          who: "capture",
          text: `<span class="red-text" data-emotion="affection" data-score="0.89">USER_MESSAGE_CAPTURED: ${message.slice(0, 48)}</span>`
        });
        state.hall3.neuroChatLog = state.hall3.neuroChatLog.slice(-(Number(config.neuro.maxChatLines) || 80));
        saveState();
        updateRuptureNeuroChat({ refocus: true });
      }

      function submitExitCard(form) {
        const formData = new FormData(form);
        const note = String(formData.get("note") || "").trim();
        state.exit = {
          submitted: true,
          condition: String(formData.get("condition") || ""),
          being: String(formData.get("being") || ""),
          privateNoteStored: Boolean(config.exit.storePrivateNoteLocally),
          note: config.exit.storePrivateNoteLocally ? note : ""
        };
        try {
          localStorage.setItem("exitCardSubmitted", "true");
        } catch (err) {
          console.warn("exit card marker save failed", err);
        }
        saveState();
        render();
      }

      function enterRuptureLoop() {
        runtime.modalOpen = false;
        state.phase = "rupture";
        state.currentHall = 1;
        state.navigation.hall1Locked = false;
        state.navigation.hall5Available = false;
        state.tama.silent = true;
        state.tama.popupOpen = false;
        state.hall1.messages = config.simsimi.openingLines.map((text) => ({ role: "assistant", text }));
        state.hall1.scriptIndex = 0;
        ensureHall4State();
        state.hall4.mode = "broken";
        state.hall4.ruptureMessages = [];
        state.hall4.rashomon.initializedRupture = false;
        state.hall4.rashomon.lastPhase = "rupture";
        syncHall4LegacyMessages();
        state.hall3.mikuMode = "youtube";
        state.hall3.neuroMode = "generatedLog";
        state.hall3.ruptureActiveTab = "miku";
        state.hall3.ruptureMikuPlaying = false;
        runtime.ruptureChatStartedAt = null;
        runtime.transition = true;
        stopTamagotchiLoop();
        saveState();
        render();
        setTimeout(() => {
          runtime.transition = false;
          render();
        }, 1100);
      }

      function syncIntervals() {
        const shouldRunTama = state.phase === "normal" && !state.tama.silent;
        const intervalMs = Number(config.tamagotchi.popupIntervalMs) || 40000;
        if (shouldRunTama && (!runtime.tamaTimer || runtime.tamaTimerMs !== intervalMs)) {
          stopTamagotchiLoop();
          runtime.tamaTimerMs = intervalMs;
          runtime.tamaTimer = setInterval(openTamaPopup, intervalMs);
        }
        if (!shouldRunTama) stopTamagotchiLoop();

        const shouldRunNeuro =
          (state.phase === "normal" && state.currentHall === 3 && state.hall3.neuroLive) ||
          (state.phase === "rupture" && state.currentHall === 3 && state.hall3.ruptureActiveTab === "neuro");
        const neuroIntervalMs = Number(config.neuro.chatIntervalMs) || 650;
        if (shouldRunNeuro && (!runtime.neuroTimer || runtime.neuroTimerMs !== neuroIntervalMs)) {
          if (runtime.neuroTimer) clearInterval(runtime.neuroTimer);
          seedNeuroChat();
          runtime.neuroTimerMs = neuroIntervalMs;
          runtime.neuroTimer = setInterval(addNeuroAutoChat, neuroIntervalMs);
        }
        if (!shouldRunNeuro && runtime.neuroTimer) {
          clearInterval(runtime.neuroTimer);
          runtime.neuroTimer = null;
          runtime.neuroTimerMs = 0;
        }
      }

      function stopTamagotchiLoop() {
        if (runtime.tamaTimer) clearInterval(runtime.tamaTimer);
        runtime.tamaTimer = null;
        runtime.tamaTimerMs = 0;
      }

      async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) return;
        try {
          await navigator.serviceWorker.register("/sw.js");
        } catch (err) {
          console.warn("service worker registration failed", err);
        }
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, Number(value) || 0));
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeHtmlAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }
    </script>
  </body>
</html>
