<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#23a6a0">
    <title>가짜에게 진심이 되는 순간</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <script src="/config.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff8ea;
        --paper: #fffdf7;
        --ink: #182525;
        --muted: #6b7472;
        --line: #214947;
        --teal: #1aa59c;
        --mint: #bcefe2;
        --coral: #f06c55;
        --gold: #f0b840;
        --lcd: #dce8bc;
        --lcd-dark: #243023;
        --shadow: 0 18px 46px rgba(19, 55, 52, 0.18);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          linear-gradient(180deg, rgba(26, 165, 156, 0.16), transparent 280px),
          radial-gradient(circle at 20% 12%, rgba(240, 184, 64, 0.18), transparent 160px),
          var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        overflow-x: hidden;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app-shell {
        width: min(100%, 460px);
        min-height: 100dvh;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
        position: relative;
        background: rgba(255, 253, 247, 0.62);
        border-left: 1px solid rgba(33, 73, 71, 0.1);
        border-right: 1px solid rgba(33, 73, 71, 0.1);
      }

      .app-shell.rupture {
        --bg: #f4f4f1;
        --paper: #ffffff;
        --ink: #111;
        --muted: #777;
        --line: #181818;
        --teal: #2d2d2d;
        --mint: #e8e8e8;
        --coral: #111;
        --gold: #bebebe;
        --lcd: #eef0ea;
        --lcd-dark: #151515;
        background:
          repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.035) 0 1px, transparent 1px 7px),
          #f7f7f5;
      }

      .app-shell.rupture.visual-normal-hall2 {
        --bg: #fff8ea;
        --paper: #fffdf7;
        --ink: #182525;
        --muted: #6b7472;
        --line: #214947;
        --teal: #1aa59c;
        --mint: #bcefe2;
        --coral: #f06c55;
        --gold: #f0b840;
        --lcd: #dce8bc;
        --lcd-dark: #243023;
        background:
          linear-gradient(180deg, rgba(26, 165, 156, 0.16), transparent 280px),
          radial-gradient(circle at 20% 12%, rgba(240, 184, 64, 0.18), transparent 160px),
          var(--bg);
      }

      .topbar {
        padding: max(16px, env(safe-area-inset-top)) 18px 12px;
        border-bottom: 2px solid var(--line);
        background: rgba(255, 253, 247, 0.88);
        backdrop-filter: blur(16px);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .rupture .topbar {
        background: rgba(250, 250, 250, 0.9);
        border-bottom-style: dashed;
      }

      .title-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 1.04rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .phase-chip {
        min-width: 72px;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--mint);
        color: var(--ink);
        text-align: center;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .hall-kicker {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .stage {
        padding: 16px;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .hall {
        width: 100%;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .surface {
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 14px;
      }

      .panel-title {
        margin: 0 0 8px;
        font-size: 1rem;
        line-height: 1.2;
      }

      .small-copy {
        margin: 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.45;
      }

      .nav {
        padding: 12px 16px max(14px, env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        border-top: 2px solid var(--line);
        background: rgba(255, 253, 247, 0.9);
      }

      .nav button,
      .action-btn,
      .icon-btn,
      .chat-send {
        min-height: 44px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--ink);
        color: #fff;
        font-weight: 800;
        box-shadow: 0 4px 0 var(--line);
      }

      .nav button:active,
      .action-btn:active,
      .icon-btn:active,
      .chat-send:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 var(--line);
      }

      .secondary {
        background: var(--paper);
        color: var(--ink);
      }

      .danger {
        background: var(--coral);
        color: #fff;
      }

      .ghost-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .device-wrap {
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .tama-device {
        width: min(100%, 330px);
        aspect-ratio: 0.78;
        padding: 30px 24px 24px;
        border: 3px solid #17403d;
        border-radius: 48% 48% 44% 44% / 54% 54% 42% 42%;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.5), transparent 38%),
          var(--mint);
        box-shadow: inset 0 -12px 0 rgba(0, 0, 0, 0.08), 0 18px 34px rgba(8, 70, 65, 0.24);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 14px;
        position: relative;
      }

      .tama-device::before {
        content: "";
        width: 34px;
        height: 14px;
        border: 3px solid #17403d;
        border-bottom: 0;
        border-radius: 24px 24px 0 0;
        position: absolute;
        top: -12px;
        left: calc(50% - 17px);
        background: var(--gold);
      }

      .lcd {
        border: 4px solid var(--lcd-dark);
        border-radius: 6px;
        background:
          linear-gradient(rgba(36, 48, 35, 0.09) 1px, transparent 1px),
          linear-gradient(90deg, rgba(36, 48, 35, 0.07) 1px, transparent 1px),
          var(--lcd);
        background-size: 10px 10px;
        padding: 10px;
        min-height: 168px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 8px;
        color: var(--lcd-dark);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .lcd-top,
      .lcd-bottom {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.72rem;
        font-weight: 900;
      }

      .pixel-stage {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        place-items: center;
        min-height: 70px;
      }

      .pixel-being {
        width: 82px;
        height: 66px;
        position: relative;
        image-rendering: pixelated;
      }

      .pixel-being::before {
        content: "";
        position: absolute;
        inset: 10px 10px 8px;
        background: var(--lcd-dark);
        clip-path: polygon(18% 20%, 82% 20%, 82% 74%, 68% 74%, 68% 92%, 52% 92%, 52% 74%, 34% 74%, 34% 92%, 18% 92%);
      }

      .pixel-being::after {
        content: "";
        position: absolute;
        left: 28px;
        top: 30px;
        width: 8px;
        height: 8px;
        background: var(--lcd);
        box-shadow: 24px 0 0 var(--lcd);
      }

      .pixel-being.happy::before {
        clip-path: polygon(18% 22%, 82% 22%, 82% 72%, 70% 72%, 70% 88%, 54% 88%, 54% 72%, 34% 72%, 34% 88%, 18% 88%);
      }

      .pixel-being.happy::after {
        left: 24px;
        top: 28px;
        width: 8px;
        height: 8px;
        background: var(--lcd);
        box-shadow:
          28px 0 0 var(--lcd),
          8px 20px 0 -2px var(--lcd),
          16px 24px 0 -2px var(--lcd),
          24px 20px 0 -2px var(--lcd);
      }

      .pixel-being.angry::before {
        clip-path: polygon(16% 24%, 82% 18%, 86% 72%, 70% 72%, 70% 88%, 54% 88%, 54% 72%, 34% 72%, 34% 88%, 18% 88%);
      }

      .pixel-being.angry::after {
        left: 22px;
        top: 28px;
        width: 20px;
        height: 5px;
        background: var(--lcd);
        transform: rotate(18deg);
        box-shadow:
          30px -9px 0 var(--lcd),
          18px 24px 0 -1px var(--lcd);
      }

      .pixel-poop {
        width: 34px;
        height: 30px;
        position: relative;
        image-rendering: pixelated;
      }

      .pixel-poop::before {
        content: "";
        position: absolute;
        left: 5px;
        bottom: 3px;
        width: 24px;
        height: 10px;
        background: var(--lcd-dark);
        box-shadow:
          4px -8px 0 -1px var(--lcd-dark),
          9px -15px 0 -2px var(--lcd-dark),
          15px -20px 0 -4px var(--lcd-dark);
      }

      .pixel-poop::after {
        content: "";
        position: absolute;
        left: 11px;
        bottom: 8px;
        width: 4px;
        height: 4px;
        background: var(--lcd);
        box-shadow: 9px 0 0 var(--lcd);
      }

      .silent .pixel-being::before {
        opacity: 0.18;
        clip-path: polygon(15% 40%, 85% 40%, 85% 62%, 15% 62%);
      }

      .tama-speech {
        min-height: 30px;
        border: 2px solid var(--lcd-dark);
        background: rgba(255, 255, 255, 0.22);
        display: grid;
        place-items: center;
        padding: 4px 6px;
        font-size: 0.84rem;
        font-weight: 950;
        text-align: center;
      }

      .tama-speech.success {
        background: rgba(255, 255, 255, 0.42);
      }

      .tama-speech.wrong {
        background: rgba(255, 230, 220, 0.48);
      }

      .status-bars {
        display: grid;
        gap: 5px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 64px 1fr;
        align-items: center;
        gap: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.72rem;
        font-weight: 900;
      }

      .bar {
        height: 10px;
        border: 2px solid var(--lcd-dark);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 2px;
        padding: 1px;
      }

      .bar span {
        background: var(--lcd-dark);
        opacity: 0.18;
      }

      .bar span.on {
        opacity: 1;
      }

      .icon-strip {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }

      .tama-icon {
        min-height: 36px;
        border: 2px solid #17403d;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.58);
        color: #17403d;
        display: grid;
        place-items: center;
        font-size: 0.56rem;
        font-weight: 900;
        text-align: center;
      }

      .tama-icon.selected {
        background: var(--gold);
        box-shadow: inset 0 0 0 2px #fff;
      }

      .abc-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        padding-inline: 24px;
      }

      .abc-row button {
        aspect-ratio: 1;
        border-radius: 50%;
        border: 3px solid #17403d;
        background: #ff7a6b;
        color: #fff;
        font-weight: 950;
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.16);
        display: grid;
        place-items: center;
        gap: 1px;
        line-height: 1;
        padding: 8px 4px 10px;
      }

      .abc-key {
        font-size: 1.05rem;
      }

      .abc-label {
        font-size: 0.63rem;
        font-weight: 850;
      }

      .ticket-gate,
      .notice-state {
        min-height: 180px;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 26px 18px;
      }

      .miku-stage {
        min-height: 360px;
        overflow: hidden;
        background: #050505;
        position: relative;
      }

      .fullscreen-miku-active .topbar,
      .fullscreen-miku-active .nav {
        display: none;
      }

      .fullscreen-miku-active .stage {
        padding: 0;
      }

      .fullscreen-miku {
        position: fixed;
        inset: 0;
        z-index: 9999;
        width: 100vw;
        height: 100dvh;
        background: #000;
        overflow: hidden;
      }

      .miku360-shell {
        position: relative;
        width: 100%;
        min-height: min(72dvh, 640px);
        background: #000;
        overflow: hidden;
        touch-action: none;
      }

      .fullscreen-miku .miku360-shell {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
      }

      .miku360-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .miku360-video {
        display: none;
      }

      .miku360-hud {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: #fff;
        font-size: 0.76rem;
        font-weight: 800;
        pointer-events: none;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.75);
      }

      .miku360-status {
        max-width: 78%;
        line-height: 1.35;
      }

      .miku360-entry,
      .media-entry {
        position: absolute;
        inset: 0;
        z-index: 4;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        text-align: center;
      }

      .miku360-entry-box,
      .media-entry-box {
        width: min(100%, 340px);
        display: grid;
        gap: 12px;
      }

      .miku360-entry-box h2,
      .media-entry-box h2 {
        margin: 0;
        font-size: 1.08rem;
      }

      .miku360-entry-box p,
      .media-entry-box p {
        margin: 0;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.5;
        font-size: 0.88rem;
      }

      .fullscreen-miku .youtube-frame,
      .youtube-frame.fullscreen {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 0;
        aspect-ratio: auto;
      }

      .fullscreen-back-btn {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: max(12px, env(safe-area-inset-left));
        z-index: 10001;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        border-radius: 999px;
        padding: 8px 11px;
        font-size: 12px;
        backdrop-filter: blur(8px);
      }

      .cheer-cloud {
        min-height: 34px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .cheer-pill {
        padding: 8px 10px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: #e7fbf4;
        font-weight: 900;
        animation: floatUp 1.7s ease forwards;
      }

      @keyframes floatUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        20% {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translateY(-20px);
        }
      }

      .youtube-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #050505;
      }

      .youtube-frame.immersive {
        min-height: min(68dvh, 620px);
        height: min(68dvh, 620px);
        aspect-ratio: auto;
        border: 0;
        border-radius: 0;
      }

      .youtube-frame.ordinary {
        aspect-ratio: 16 / 9;
      }

      .youtube-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .iframe-shield {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: transparent;
      }

      .iframe-shield.pan-lock {
        bottom: 56px;
      }

      .youtube-touch-blocker {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: transparent;
      }

      .sound-overlay {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: grid;
        place-items: center;
        padding: 18px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.42));
        color: #fff;
        text-align: center;
        font-weight: 850;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.58);
      }

      .media-ready-copy {
        text-align: center;
        margin: 8px 18px 0;
      }

      .live-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 800;
      }

      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: #fff3f0;
        color: #b52020;
      }

      .chat-log {
        height: 210px;
        overflow: auto;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #101411;
        color: #eefbea;
        padding: 10px;
        display: grid;
        align-content: end;
        gap: 7px;
        font-size: 0.82rem;
      }

      .chat-line {
        line-height: 1.35;
      }

      .chat-line strong {
        color: #90e7d2;
      }

      .chat-line.me strong {
        color: #ffd36f;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .text-input {
        min-height: 44px;
        width: 100%;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
      }

      .chat-panel {
        height: 380px;
        overflow: auto;
        padding: 12px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(90deg, rgba(26, 165, 156, 0.06), transparent),
          #fffef9;
        display: grid;
        align-content: end;
        gap: 10px;
      }

      .hall4-meta {
        display: grid;
        gap: 4px;
      }

      .hall4-complete {
        margin-top: 10px;
      }

      .suggestion-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .suggestion-row button {
        min-height: 40px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #fffaf0;
        color: var(--ink);
        font: inherit;
        font-size: 0.82rem;
        text-align: left;
        padding: 8px 10px;
        cursor: pointer;
      }

      .suggestion-row button:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .message {
        max-width: 88%;
        padding: 10px 12px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #e9fbf5;
        line-height: 1.42;
        font-size: 0.9rem;
      }

      .message.user {
        justify-self: end;
        background: #fff2cf;
      }

      .message.system {
        justify-self: center;
        background: #f7f7f7;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .rupture .message {
        background: #fff;
        border-style: dashed;
      }

      .ordinary-video-meta {
        display: grid;
        gap: 10px;
      }

      .ordinary-miku-video {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #050505;
        object-fit: cover;
      }

      .ordinary-title {
        margin: 0;
        font-size: 1rem;
      }

      .ordinary-actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .ordinary-actions span {
        border: 1px solid #d6d6d6;
        border-radius: 999px;
        padding: 7px 4px;
        text-align: center;
        font-size: 0.74rem;
        color: #444;
        background: #f5f5f5;
      }

      .rupture-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .rupture-tab {
        min-height: 44px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #f1f1ef;
        color: var(--ink);
        font-weight: 900;
      }

      .rupture-tab.active {
        background: var(--ink);
        color: #fff;
      }

      .chat-line.markup-line {
        color: #ffd6d6;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow-wrap: anywhere;
      }

      .markup-line strong {
        color: #ff8b8b;
      }

      .exit-card {
        display: grid;
        gap: 14px;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .choice-grid label {
        min-height: 46px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        padding: 9px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.86rem;
        font-weight: 800;
      }

      .choice-grid input {
        accent-color: var(--teal);
      }

      .note-area {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        padding: 12px;
        background: #fff;
        color: var(--ink);
        line-height: 1.45;
      }

      .receipt-slot {
        min-height: 190px;
        display: grid;
        place-items: center;
        text-align: center;
        border: 2px dashed var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.32)),
          var(--paper);
        padding: 18px;
      }

      .modal-backdrop,
      .transition {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 22px;
        background: rgba(10, 14, 14, 0.54);
      }

      .modal {
        width: min(100%, 370px);
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        padding: 18px;
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.28);
      }

      .modal-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .transition {
        z-index: 30;
        background: #f3f3f1;
        color: #111;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-align: center;
      }

      .transition-box {
        border: 2px dashed #111;
        padding: 22px;
        width: min(100%, 340px);
        background: #fff;
      }

      .tama-popup {
        position: fixed;
        left: 50%;
        bottom: max(16px, env(safe-area-inset-bottom));
        z-index: 15;
        width: min(calc(100% - 28px), 420px);
        transform: translateX(-50%);
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: #fffdf7;
        box-shadow: 0 16px 38px rgba(0, 0, 0, 0.24);
        padding: 12px;
        animation: slideUp 0.24s ease;
      }

      .popup-close {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        border: 2px solid #111;
        border-radius: 4px;
        background: #ff3b30;
        color: #111;
        font-size: 1rem;
        font-weight: 950;
        line-height: 1;
        display: grid;
        place-items: center;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translate(-50%, 16px);
        }
        to {
          opacity: 1;
          transform: translate(-50%, 0);
        }
      }

      .popup-grid {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        align-items: center;
      }

      .mini-lcd {
        height: 54px;
        border: 3px solid var(--lcd-dark);
        background: var(--lcd);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .mini-lcd .pixel-stage {
        width: 100%;
        min-height: 0;
        justify-content: flex-start;
        gap: 0;
        padding-left: 2px;
        transform: scale(0.46);
        transform-origin: left center;
      }

      .mini-lcd .pixel-poop {
        transform: translate(2px, 7px);
        flex: 0 0 28px;
      }

      .mini-lcd .pixel-being {
        flex: 0 0 82px;
        transform: translateX(-2px);
      }

      .popup-actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
        gap: 7px;
        margin-top: 10px;
      }

      .popup-actions button {
        min-height: 38px;
        border: 2px solid var(--line);
        border-radius: var(--radius);
        background: var(--mint);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .tama-popup.resolved .popup-actions button {
        color: transparent;
        background: transparent;
        border-color: transparent;
        box-shadow: none;
        cursor: default;
      }

      .tama-popup.resolved .popup-close {
        opacity: 0.42;
        filter: grayscale(1);
        cursor: default;
      }

      .loading {
        opacity: 0.68;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 380px) {
        .stage {
          padding: 12px;
        }

        .panel {
          padding: 12px;
        }

        .tama-device {
          padding-inline: 18px;
        }

        .abc-row {
          padding-inline: 14px;
          gap: 14px;
        }

        .ordinary-actions {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="shell" class="app-shell">
      <header id="topbar" class="topbar"></header>
      <main id="stage" class="stage"></main>
      <nav id="nav" class="nav" aria-label="전시관 이동"></nav>
    </div>
    <div id="modalRoot"></div>
    <div id="popupRoot"></div>
    <script>
      const STORAGE_KEY = "attachment-exhibition-state-v4";
      const TAMA_ICONS = ["FOOD", "LIGHT", "GAME", "TOILET"];
      const defaultState = {
        phase: "normal",
        currentHall: 2,
        sessionId: "",
        navigation: {
          hall1Locked: true,
          hall5Available: true
        },
        hall1: {
          messages: [],
          scriptIndex: 0
        },
        exit: {
          submitted: false,
          condition: "",
          being: "",
          privateNoteStored: false,
          note: ""
        },
        media: {
          ready: false,
          soundReady: false,
          vibrationReady: false,
          soundOverlayDismissed: false,
          promptAnswered: false,
          permissionDeclined: false,
          message: ""
        },
        tama: {
          silent: false,
          callCount: 0,
          lastCareAction: null,
          popupOpen: false,
          currentNeed: "FOOD",
          displayMessage: "",
          displayMode: "request",
          popupNeed: "",
          popupMessage: "",
          popupResolved: false,
          popupFeedback: "",
          selectedIconIndex: 0,
          hunger: 3,
          happy: 3,
          sick: false,
          dirty: false
        },
        hall3: {
          mikuTicket: false,
          neuroLive: false,
          mikuMode: "locked",
          neuroMode: "locked",
          focusMode: "both",
          mikuExperienceReady: false,
          mikuEntryPromptOpen: false,
          mikuGyroEnabled: false,
          mikuGestureFallback: true,
          mikuStatusMessage: "",
          neuroExperienceReady: false,
          neuroEntryPromptOpen: false,
          ruptureMikuPlaying: false,
          ruptureActiveTab: "miku",
          mikuCheerLog: [],
          neuroChatLog: []
        },
        hall4: {
          mode: "normal",
          messages: [],
          normalMessages: [],
          ruptureMessages: [],
          memorySummary: "",
          rashomon: {
            turnCount: 0,
            maxTurns: 10,
            pendingMessage: "",
            initializedNormal: false,
            initializedRupture: false,
            completedNormal: false,
            awaitingFinalAnswer: false,
            finalAnswerSubmitted: false,
            finalAnswer: "",
            userTheory: "",
            userBeliefs: [],
            userSuspicions: [],
            sharedClues: [],
            pressurePoints: [],
            woodcutterAdmissions: [],
            woodcutterEvasions: [],
            distortionCandidates: [],
            distortionPlan: [],
            lastGoal: "",
            lastPhase: "normal"
          }
        }
      };

      let config = window.DEFAULT_CONFIG;
      let state = clone(defaultState);
      const runtime = {
        tamaTimer: null,
        tamaTimerMs: 0,
        neuroTimer: null,
        neuroTimerMs: 0,
        miku360: null,
        mikuThreePromise: null,
        chatBusy: false,
        cooldownUntil: 0,
        cheers: [],
        modalOpen: false,
        transition: false,
        ruptureHall3EnteredAt: null,
        ruptureChatStartedAt: null
      };

      document.addEventListener("DOMContentLoaded", init);
      document.addEventListener("click", handleClick);
      document.addEventListener("submit", handleSubmit);

      async function init() {
        config = await window.loadConfig();
        state = loadStoredState();
        applyQueryParams();
        registerServiceWorker();
        ensureInitialMessages();
        render();
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function createSessionId() {
        if (crypto && typeof crypto.randomUUID === "function") return crypto.randomUUID();
        return `s-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      }

      function loadStoredState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const saved = raw ? JSON.parse(raw) : {};
          const merged = window.deepMerge(defaultState, saved);
          if (!merged.sessionId) merged.sessionId = createSessionId();
          return merged;
        } catch (err) {
          console.warn("state load failed", err);
          const fresh = clone(defaultState);
          fresh.sessionId = createSessionId();
          return fresh;
        }
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (err) {
          console.warn("state save failed", err);
        }
      }

      function resetState() {
        state = clone(defaultState);
        state.sessionId = createSessionId();
        saveState();
      }

      function applyQueryParams() {
        const params = new URLSearchParams(location.search);
        if (params.get("reset") === "1") resetState();

        const mode = params.get("mode");
        if (mode === "miku") {
          state.phase = "normal";
          state.currentHall = 3;
          state.hall3.mikuTicket = true;
          state.hall3.mikuMode = "youtube360";
          state.hall3.focusMode = "miku";
          state.hall3.mikuExperienceReady = false;
          state.hall3.mikuEntryPromptOpen = true;
          saveState();
        }
        if (mode === "neuro") {
          state.phase = "normal";
          state.currentHall = 3;
          state.hall3.neuroLive = true;
          state.hall3.neuroMode = "live";
          state.hall3.focusMode = "neuro";
          state.hall3.neuroExperienceReady = false;
          state.hall3.neuroEntryPromptOpen = true;
          seedNeuroChat();
          saveState();
        }
        if ((params.has("reset") || params.has("mode")) && history.replaceState) {
          history.replaceState(null, "", location.pathname || "/");
        }
      }

      function ensureInitialMessages() {
        ensureTamaNeed();
        ensureHall4State();
        ensureHall4NormalIntro();
        if (!state.hall1.messages.length) {
          state.hall1.messages = config.simsimi.openingLines.map((text) => ({ role: "assistant", text }));
        }
        if (typeof state.hall1.scriptIndex !== "number") {
          state.hall1.scriptIndex = 0;
        }
        saveState();
      }

      function ensureHall4State() {
        state.hall4 = window.deepMerge(clone(defaultState.hall4), state.hall4 || {});
        state.hall4.rashomon = window.deepMerge(clone(defaultState.hall4.rashomon), state.hall4.rashomon || {});
        state.hall4.rashomon.maxTurns = Number(config.llm?.rashomon?.maxTurns) || 10;
        state.hall4.normalMessages = Array.isArray(state.hall4.normalMessages) ? state.hall4.normalMessages : [];
        state.hall4.ruptureMessages = Array.isArray(state.hall4.ruptureMessages) ? state.hall4.ruptureMessages : [];
        state.hall4.messages = Array.isArray(state.hall4.messages) ? state.hall4.messages : [];
        if (state.hall4.messages.length && !state.hall4.normalMessages.length) {
          state.hall4.normalMessages = state.hall4.messages.filter((item) => item && item.text);
        }
        if (typeof state.hall4.rashomon.turnCount !== "number") {
          state.hall4.rashomon.turnCount = Math.max(0, state.hall4.normalMessages.filter((item) => item.role === "user").length);
        }
        state.hall4.rashomon.turnCount = normalizeHall4TurnCount(state.hall4.rashomon.turnCount);
        state.hall4.rashomon.pendingMessage = state.hall4.rashomon.pendingMessage || "";
        state.hall4.rashomon.finalAnswer = state.hall4.rashomon.finalAnswer || "";
        if (
          state.phase === "normal" &&
          state.hall4.rashomon.turnCount >= state.hall4.rashomon.maxTurns &&
          !state.hall4.rashomon.finalAnswerSubmitted
        ) {
          state.hall4.rashomon.awaitingFinalAnswer = true;
        }
        if (
          state.hall4.rashomon.completedNormal &&
          !state.hall4.rashomon.finalAnswerSubmitted &&
          !state.hall4.rashomon.finalAnswer &&
          state.hall4.rashomon.turnCount >= state.hall4.rashomon.maxTurns
        ) {
          state.hall4.rashomon.completedNormal = false;
          state.hall4.rashomon.awaitingFinalAnswer = true;
        }
        state.hall4.rashomon.awaitingFinalAnswer = Boolean(state.hall4.rashomon.awaitingFinalAnswer);
        state.hall4.rashomon.finalAnswerSubmitted = Boolean(
          state.hall4.rashomon.finalAnswerSubmitted ||
          (state.hall4.rashomon.completedNormal && state.hall4.rashomon.finalAnswer)
        );
        syncHall4LegacyMessages();
      }

      function normalizeHall4TurnCount(value) {
        const maxTurns = Number(state.hall4?.rashomon?.maxTurns) || Number(config.llm?.rashomon?.maxTurns) || 10;
        const numeric = Number(value);
        const count = Number.isFinite(numeric) ? numeric : 0;
        return Math.max(0, Math.min(maxTurns, count));
      }

      function ensureHall4NormalIntro() {
        ensureHall4State();
        if (state.hall4.rashomon.initializedNormal && state.hall4.normalMessages.length) return;
        state.hall4.normalMessages = [
          {
            role: "system",
            text: "당신은 길을 가다 이 말을 듣고 나무꾼에게 다가갑니다. 나무꾼과 대화해 숲속 사건의 진실을 추적하세요."
          },
          {
            role: "assistant",
            text: "모르겠어, 아무도 모르겠어… 사람을 못 믿겠어."
          }
        ];
        state.hall4.rashomon.initializedNormal = true;
        state.hall4.rashomon.lastGoal = hall4GoalText("normal");
        syncHall4LegacyMessages();
      }

      function ensureHall4RuptureIntro() {
        ensureHall4State();
        const fixedIntro = hall4RuptureOpening();
        const startsWithFixedIntro =
          state.hall4.ruptureMessages[0]?.role === "assistant" &&
          state.hall4.ruptureMessages[0]?.text === fixedIntro;
        if (state.hall4.rashomon.initializedRupture && startsWithFixedIntro) return;
        state.hall4.ruptureMessages = [
          {
            role: "assistant",
            text: fixedIntro
          }
        ];
        state.hall4.rashomon.initializedRupture = true;
        state.hall4.rashomon.lastGoal = hall4GoalText("rupture");
        state.hall4.rashomon.lastPhase = "rupture";
        syncHall4LegacyMessages();
      }

      function hall4RuptureOpening() {
        return "다시 오셨군요. 어제는 이야기를 오래 붙잡았지요. 당신과 대화가 재판에서의 증언에 도움이 되었습니다!";
      }

      function currentHall4Messages() {
        ensureHall4State();
        return state.phase === "rupture" ? state.hall4.ruptureMessages : state.hall4.normalMessages;
      }

      function syncHall4LegacyMessages() {
        state.hall4.messages = state.phase === "rupture" ? state.hall4.ruptureMessages : state.hall4.normalMessages;
      }

      function hall4GoalText(phase = state.phase) {
        const rashomonConfig = config.llm?.rashomon || {};
        if (phase === "rupture") {
          return rashomonConfig.ruptureGoal || "현재 목표: 재판 이후 나무꾼과 후일담 나누기";
        }
        return rashomonConfig.normalGoal || "현재 목표: 나무꾼과 대화해서 사건의 내용 파악하기";
      }

      function ensureTamaNeed() {
        if (state.tama.selectedIconIndex >= TAMA_ICONS.length) {
          state.tama.selectedIconIndex = 0;
        }
        if (!TAMA_ICONS.includes(state.tama.currentNeed)) {
          state.tama.currentNeed = randomTamaNeed();
        }
        if (!state.tama.displayMessage) {
          state.tama.displayMessage = tamaRequestText(state.tama.currentNeed);
          state.tama.displayMode = "request";
        }
        if (typeof state.tama.popupFeedback !== "string") {
          state.tama.popupFeedback = "";
        }
      }

      function hallName(hall = state.currentHall) {
        const names = {
          1: "Hall I · 응답하는 존재",
          2: "Hall II · 돌봄을 요구하는 존재",
          3: "Hall III · 함께 만들어지는 존재",
          4: "Hall IV · 이어지는 존재",
          5: "Hall V",
          exit: "출구 · 개별 기록 카드"
        };
        return names[hall] || "Hall";
      }

      function getAvailableMoves() {
        if (state.phase === "normal") {
          if (state.currentHall === 2) return [3];
          if (state.currentHall === 3) return [2, 4];
          if (state.currentHall === 4) return [3, 5];
          return [];
        }

        if (state.phase === "rupture") {
          if (state.currentHall === 1) return [2];
          if (state.currentHall === 2) return [1, 3];
          if (state.currentHall === 3) return [2, 4];
          if (state.currentHall === 4) return [3, "exit"];
          return [];
        }

        return [];
      }

      function render() {
        const shell = document.getElementById("shell");
        shell.classList.toggle("rupture", state.phase === "rupture");
        shell.classList.toggle("visual-normal-hall2", state.phase === "rupture" && state.currentHall === 2);
        shell.classList.toggle("fullscreen-miku-active", isMikuFullscreen());
        renderHeader();
        renderHall();
        renderNav();
        renderModal();
        renderPopup();
        syncIntervals();
        mountMiku360Soon();
      }

      function renderHeader() {
        document.getElementById("topbar").innerHTML = `
          <div class="title-row">
            <h1>${escapeHtml(config.main.appTitle)}</h1>
            <div class="phase-chip">${state.phase === "normal" ? "NORMAL" : "AFTER"}</div>
          </div>
          <div class="hall-kicker">${escapeHtml(hallName())}</div>
        `;
      }

      function renderHall() {
        const stage = document.getElementById("stage");
        let html = "";
        if (state.phase === "normal") {
          if (state.currentHall === 2) html = renderHall2Normal();
          if (state.currentHall === 3) html = renderHall3Normal();
          if (state.currentHall === 4) html = renderHall4();
        } else {
          if (state.currentHall === 1) html = renderHall1Rupture();
          if (state.currentHall === 2) html = renderHall2Rupture();
          if (state.currentHall === 3) html = renderHall3Rupture();
          if (state.currentHall === 4) html = renderHall4();
          if (state.currentHall === "exit") html = renderExitHall();
        }
        stage.innerHTML = `<section class="hall">${html}</section>`;
      }

      function renderNav() {
        const nav = document.getElementById("nav");
        const moves = getAvailableMoves();
        nav.innerHTML = moves
          .map((hall) => {
            let label = hall === 5 ? "5관" : `${hall}관`;
            if (state.phase === "rupture" && state.currentHall === 4 && hall === 3) label = "3관으로 돌아가기";
            if (hall === "exit") label = "출구로 이동";
            const className = hall === 5 ? "danger" : "secondary";
            return `<button class="${className}" data-move="${hall}">${label}</button>`;
          })
          .join("");
      }

      function renderHall2Normal() {
        return `
          <div class="device-wrap">
            ${renderTamaDevice(false)}
            ${state.media?.message ? `<p class="small-copy media-ready-copy">${escapeHtml(state.media.message)}</p>` : ""}
          </div>
        `;
      }

      function renderHall2Rupture() {
        return `
          <div class="device-wrap">
            ${renderTamaDevice(false, { quiet: true })}
          </div>
        `;
      }

      function renderTamaDevice(silent, options = {}) {
        ensureTamaNeed();
        const iconHtml = TAMA_ICONS.map((name, index) => {
          const selected = !silent && index === state.tama.selectedIconIndex ? " selected" : "";
          return `<div class="tama-icon${selected}">${name}</div>`;
        }).join("");
        const hungerValue = silent ? 0 : clamp(state.tama.hunger, 0, 5);
        const happyValue = silent ? 0 : clamp(state.tama.happy, 0, 5);
        const top = "";
        const call = "";
        const lcdMessage = options.quiet ? "" : state.tama.displayMessage || tamaRequestText(state.tama.currentNeed);
        const moodClass = options.quiet ? "" : state.tama.displayMode === "success" ? "happy" : state.tama.displayMode === "wrong" ? "angry" : "";
        const showPoop = !options.quiet && state.tama.currentNeed === "TOILET" && state.tama.displayMode !== "success";
        return `
          <div class="tama-device${silent ? " silent" : ""}">
            <div class="icon-strip">${iconHtml}</div>
            <div class="lcd">
              <div class="lcd-top"><span>${top}</span><span>${call}</span></div>
              <div class="pixel-stage">${showPoop ? `<div class="pixel-poop" aria-hidden="true"></div>` : ""}<div class="pixel-being ${moodClass}"></div></div>
              <div class="tama-speech ${state.tama.displayMode === "success" ? "success" : state.tama.displayMode === "wrong" ? "wrong" : ""}">${escapeHtml(lcdMessage)}</div>
              <div class="status-bars">
                ${renderBar("호감", clamp(state.tama.happy, 0, 5))}
              </div>
            </div>
            <div class="abc-row">
              <button data-tama="A" aria-label="A button"><span class="abc-key">A</span><span class="abc-label">이동</span></button>
              <button data-tama="B" aria-label="B button"><span class="abc-key">B</span><span class="abc-label">선택</span></button>
              <button data-tama="C" aria-label="C button"><span class="abc-key">C</span><span class="abc-label">취소</span></button>
            </div>
          </div>
        `;
      }

      function renderBar(label, value) {
        const spans = Array.from({ length: 5 }, (_, index) => `<span class="${index < value ? "on" : ""}"></span>`).join("");
        return `<div class="bar-row"><span>${label}</span><div class="bar">${spans}</div></div>`;
      }

      function tamaCaption() {
        ensureTamaNeed();
        return state.tama.displayMessage || tamaRequestText(state.tama.currentNeed);
      }

      function renderHall3Normal() {
        if (state.hall3.focusMode === "miku") return renderHall3MikuFullscreen();
        if (state.hall3.focusMode === "neuro") return renderHall3NeuroFocused();
        return `
          ${renderMikuNormal()}
          ${renderNeuroNormal()}
        `;
      }

      function renderHall3MikuFullscreen() {
        return `
          <section class="fullscreen-miku" aria-label="Hatsune Miku 360 fullscreen">
            <button class="fullscreen-back-btn" type="button" data-action="exit-focus">← 3관</button>
            ${renderMiku360Player({ fullscreen: true })}
          </section>
        `;
      }

      function renderHall3NeuroFocused() {
        return `

      function renderYoutubeFrame(options) {
        const {
          videoId,
          playlistId = "",
          start = 0,
          autoplay = true,
          muted = true,

          immersive = false,
          fullscreen = false,
          blockPan = false,
          keepControlsUsable = false,
          title = "YouTube video",
          iframeId = "",
          soundFallback = false
        } = options || {};
        const origin = location.origin && location.origin !== "null" ? location.origin : config.main.mainPwaUrl;
        const list = playlistId ? `&list=${encodeURIComponent(playlistId)}` : "";
        const params = [
          `autoplay=${autoplay ? 1 : 0}`,
          muted ? "mute=1" : "mute=0",
          `controls=${controls ? 1 : 0}`,
          "disablekb=1",
          "playsinline=1",
          "fs=0",
          "rel=0",
          "modestbranding=1",
          "enablejsapi=1",
          "cc_load_policy=1",
          "cc_lang_pref=ko",
          "hl=ko",
          `start=${Number(start) || 0}`,
          `origin=${encodeURIComponent(origin)}`
        ].join("&");
        const src =
          `https://www.youtube.com/embed/${encodeURIComponent(videoId)}` +
          `?${params}${list}`;
        const frameClass = `youtube-frame ${fullscreen ? "fullscreen" : immersive ? "immersive" : "ordinary"}`;
        const shieldClass = `iframe-shield ${keepControlsUsable ? "pan-lock" : ""}`.trim();
        const showSoundFallback = soundFallback && !state.media?.soundReady && !state.media?.soundOverlayDismissed;
        return `
          <div class="${frameClass}">
            <iframe ${iframeId ? `id="${escapeHtmlAttr(iframeId)}"` : ""} src="${src}" title="${escapeHtmlAttr(title)}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
            ${blockPan ? `<div class="${shieldClass}" aria-hidden="true"></div>` : ""}
            ${showSoundFallback ? `<button class="sound-overlay" type="button" data-action="retry-sound">화면을 한 번 눌러 소리 켜기</button>` : ""}
          </div>
        `;
      }

      function mountMiku360Soon() {

      async function loadThreeModule() {
        if (window.THREE) return window.THREE;
        if (!runtime.mikuThreePromise) {
          runtime.mikuThreePromise = import(config.miku.threeModuleUrl || "https://unpkg.com/three@0.160.0/build/three.module.js")
            .then((module) => {
              window.THREE = module;
              return module;
            });
        }
        return runtime.mikuThreePromise;
      }

      async function initMiku360Player(shell) {
        if (runtime.miku360?.shell === shell) return;
        disposeMiku360Player();
        const canvas = shell.querySelector(".miku360-canvas");
        const video = shell.querySelector(".miku360-video");
        if (!canvas || !video) return;
        try {
          const THREE = await loadThreeModule();
          const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(75, 1, 1, 1100);
          const geometry = new THREE.SphereGeometry(500, 64, 40);
          geometry.scale(-1, 1, 1);
          const texture = new THREE.VideoTexture(video);
          if ("SRGBColorSpace" in THREE) texture.colorSpace = THREE.SRGBColorSpace;
          const material = new THREE.MeshBasicMaterial({ map: texture });
          const mesh = new THREE.Mesh(geometry, material);
          scene.add(mesh);

          const player = {
            THREE,
            shell,
            video,
            renderer,
            scene,
            camera,
            geometry,
            texture,
            material,
            frame: 0,
            lon: 0,
            lat: 0,
            dragging: false,
            lastX: 0,
            lastY: 0,
            gyro: null
          };

          const resize = () => {
            if (runtime.miku360 !== player) return;
            const rect = shell.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width));
            const height = Math.max(1, Math.floor(rect.height));
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setSize(width, height, false);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
          };

          const pointerDown = (event) => {
            player.dragging = true;
            player.lastX = event.clientX;
            player.lastY = event.clientY;
            shell.setPointerCapture?.(event.pointerId);
          };
          const pointerMove = (event) => {
            if (!player.dragging) return;
            player.lon -= (event.clientX - player.lastX) * 0.12;
            player.lat += (event.clientY - player.lastY) * 0.12;
            player.lat = Math.max(-85, Math.min(85, player.lat));
            player.lastX = event.clientX;
            player.lastY = event.clientY;
          };
          const pointerUp = () => {
            player.dragging = false;
          };
          const orientation = (event) => {
            if (!state.hall3.mikuGyroEnabled) return;
            player.gyro = {
              alpha: Number(event.alpha) || 0,
              beta: Number(event.beta) || 0
            };
          };
          const videoError = () => {
            setMikuStatus("miku360_equirect.mp4를 불러오지 못했습니다. 변환 스크립트를 먼저 실행해 주세요.");
          };

          shell.addEventListener("pointerdown", pointerDown);
          shell.addEventListener("pointermove", pointerMove);
          shell.addEventListener("pointerup", pointerUp);
          shell.addEventListener("pointercancel", pointerUp);
          window.addEventListener("resize", resize);
          window.addEventListener("deviceorientation", orientation, true);
          video.addEventListener("error", videoError);

          player.cleanup = () => {
            cancelAnimationFrame(player.frame);
            shell.removeEventListener("pointerdown", pointerDown);
            shell.removeEventListener("pointermove", pointerMove);
            shell.removeEventListener("pointerup", pointerUp);
            shell.removeEventListener("pointercancel", pointerUp);
            window.removeEventListener("resize", resize);
            window.removeEventListener("deviceorientation", orientation, true);
            video.removeEventListener("error", videoError);
            texture.dispose();
            material.dispose();
            geometry.dispose();
            renderer.dispose();
          };

          runtime.miku360 = player;
          resize();
          animateMiku360();
          video.play().catch(() => setMikuStatus("화면을 한 번 더 터치하면 재생됩니다"));
        } catch (err) {
          console.error("miku 360 init failed", err);
          setMikuStatus("360도 플레이어를 불러오지 못했습니다. 네트워크와 Three.js 로드를 확인해 주세요.");
        }
      }

      function animateMiku360() {
        const player = runtime.miku360;
        if (!player) return;
        if (player.gyro && state.hall3.mikuGyroEnabled) {
          player.lon = -player.gyro.alpha;
          player.lat = Math.max(-85, Math.min(85, player.gyro.beta - 90));
        }
        const phi = player.THREE.MathUtils.degToRad(90 - player.lat);
        const theta = player.THREE.MathUtils.degToRad(player.lon);
        player.camera.lookAt(
          500 * Math.sin(phi) * Math.cos(theta),
          500 * Math.cos(phi),
          500 * Math.sin(phi) * Math.sin(theta)
        );
        player.renderer.render(player.scene, player.camera);
        player.frame = requestAnimationFrame(animateMiku360);
      }

      function disposeMiku360Player() {
        if (!runtime.miku360) return;
        runtime.miku360.cleanup?.();
        runtime.miku360 = null;
      }

      function setMikuStatus(message) {
        state.hall3.mikuStatusMessage = message;
        const status = document.querySelector(".miku360-status");
        if (status) status.textContent = message;
        saveState();
