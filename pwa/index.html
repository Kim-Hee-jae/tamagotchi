<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#b7c98d" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>동행 다마고치</title>
  <style>
    :root{--bg:#dfe8c8;--panel:#b7c98d;--text:#24301d;--ink:#172114;--accent:#f4fae8;--warn:#fff2c4;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#b3c393 0%,#dfe8c8 100%);color:var(--text);display:flex;align-items:center;justify-content:center;padding:16px;}
    .device{width:min(430px,100%);border:4px solid var(--ink);border-radius:28px;background:var(--panel);padding:16px;box-shadow:0 10px 0 #5b6946,0 22px 24px rgba(0,0,0,.18);}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:900;font-size:14px;}
    .screen{border:4px solid var(--ink);background:var(--bg);border-radius:12px;padding:14px 12px 12px;min-height:460px;display:flex;flex-direction:column;gap:10px;}
    .status{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:12px;text-align:center;}
    .pill{border:2px solid var(--ink);border-radius:999px;padding:4px 5px;background:var(--accent);font-weight:900;}
    .pixel-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;border:3px solid var(--ink);border-radius:12px;background:repeating-linear-gradient(0deg,rgba(0,0,0,.035) 0 2px,transparent 2px 18px),repeating-linear-gradient(90deg,rgba(0,0,0,.035) 0 2px,transparent 2px 18px),#d8e6bf;overflow:hidden;min-height:220px;}
    .pixel-grid{display:grid;grid-template-columns:repeat(16,14px);grid-template-rows:repeat(16,14px);transform:scale(1.15);transform-origin:center;image-rendering:pixelated;margin-top:6px;}
    .px{width:14px;height:14px;background:transparent}.ink{background:var(--ink);}
    .heart{position:absolute;top:16px;right:20px;font-size:26px;opacity:0;transform:translateY(8px);transition:.25s}.heart.show{opacity:1;transform:translateY(0);}
    .shake{animation:shake .3s linear 0s 2}@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(4px)}75%{transform:translateX(-3px)}100%{transform:translateX(0)}}
    .bubble{min-height:64px;border:3px solid var(--ink);border-radius:12px;background:var(--accent);padding:10px;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.45}.bubble.rupture{background:#edf1dc;color:#5d674f;}
    .req{min-height:18px;font-size:12px;text-align:center;color:#304126;font-weight:900;}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .setup{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    button{border:none;border-bottom:4px solid #49573a;border-radius:12px;background:#f7fbef;color:var(--text);font-weight:900;font-size:14px;padding:13px 8px;cursor:pointer;}
    button:active{transform:translateY(2px);border-bottom-width:2px;} button.small{font-size:12px;padding:10px 6px;background:#fff6d6;} button[disabled]{opacity:.45;filter:grayscale(1);}
    .note{border:2px dashed var(--ink);border-radius:12px;background:var(--warn);padding:9px;text-align:center;font-size:12px;line-height:1.45;font-weight:800}.note.rupture{background:#e8edd8;color:#5a6550;}
  </style>
</head>
<body>
  <div class="device">
    <div class="top"><div id="title">동행 다마고치</div><div id="clock"></div></div>
    <div class="screen">
      <div class="status">
        <div class="pill">배고픔 <span id="hungerValue">45</span></div>
        <div class="pill">기분 <span id="moodValue">72</span></div>
        <div class="pill">유대감 <span id="bondValue">18</span></div>
      </div>

      <div id="pixelWrap" class="pixel-wrap"><div id="pixelFace" class="pixel-grid"></div><div id="heart" class="heart">♥</div></div>

      <div id="message" class="bubble">안녕! 알림을 허용하면 내가 전시 중에 먹이나 쓰다듬기를 부탁할게.</div>
      <div id="requestHint" class="req">요청 준비 중</div>

      <div class="actions">
        <button id="feedBtn">먹이 주기</button>
        <button id="petBtn">쓰다듬기</button>
      </div>

      <div class="setup">
        <button id="installBtn" class="small">앱 설치</button>
        <button id="notifyBtn" class="small">알림 허용</button>
      </div>

      <div id="note" class="note">PWA 설치 후 알림을 허용하면, 전시 이동 중 다마고치 요청 알림을 받을 수 있습니다. 서버 설정이 없으면 앱이 실행 중일 때 로컬 알림으로 작동합니다.</div>
    </div>
  </div>

<script src="/config.js"></script>
<script>
  const CONFIG = window.TAMA_CONFIG || {};
  const params = new URLSearchParams(location.search);
  const reset = params.get("reset") === "1";
  const immediateRupture = params.get("mode") === "rupture" || params.get("mode") === "5";
  const stopAfterParam = params.get("stopAfter") || params.get("ruptureAfter");
  const startPush = params.get("startPush") === "1";

  if (reset) {
    localStorage.removeItem("tama-rupture-at-pwa");
    localStorage.removeItem("tama-state-pwa");
    localStorage.removeItem("tama-user-id");
  }

  const $ = (id) => document.getElementById(id);
  const pixelFace = $("pixelFace"), pixelWrap = $("pixelWrap"), message = $("message"), requestHint = $("requestHint"), heart = $("heart");
  const hungerValue = $("hungerValue"), moodValue = $("moodValue"), bondValue = $("bondValue"), title = $("title"), note = $("note"), clock = $("clock");
  const feedBtn = $("feedBtn"), petBtn = $("petBtn"), installBtn = $("installBtn"), notifyBtn = $("notifyBtn");

  const faces = {
    happy:['0000000000000000','0000000111100000','0000011111110000','0000111111111000','0001111111111100','0011110011001110','0011110011001110','0011111111111110','0011111111111110','0011111000011110','0011110111101110','0001111111111100','0000111111111000','0000011111110000','0000000111100000','0000000000000000'],
    neutral:['0000000000000000','0000000111100000','0000011111110000','0000111111111000','0001111111111100','0011110011001110','0011110011001110','0011111111111110','0011111111111110','0011111111111110','0011110111101110','0001111111111100','0000111111111000','0000011111110000','0000000111100000','0000000000000000'],
    sad:['0000000000000000','0000000111100000','0000011111110000','0000111111111000','0001111111111100','0011110011001110','0011110011001110','0011111111111110','0011111111111110','0011110111101110','0011111000011110','0001110000001100','0000111111111000','0000011111110000','0000000111100000','0000000000000000'],
    blank:['0000000000000000','0000000111100000','0000011111110000','0000111111111000','0001111111111100','0011111111111110','0011111111111110','0011111111111110','0011111111111110','0011111111111110','0011111111111110','0001111111111100','0000111111111000','0000011111110000','0000000111100000','0000000000000000']
  };

  function getUserId(){
    let id = localStorage.getItem("tama-user-id");
    if (!id) {
      id = "user-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("tama-user-id", id);
    }
    return id;
  }

  function renderFace(pattern){
    pixelFace.innerHTML = "";
    pattern.forEach(row => [...row].forEach(v => {
      const cell = document.createElement("div");
      cell.className = "px";
      if (v === "1") cell.classList.add("ink");
      pixelFace.appendChild(cell);
    }));
  }

  const saved = JSON.parse(localStorage.getItem("tama-state-pwa") || "{}");
  const state = {hunger:saved.hunger??45,mood:saved.mood??72,bond:saved.bond??18,activeRequest:null,happyUntil:0,rupture:false,localNotifyTimer:null,requestTimer:null,decayTimer:null};

  const requestLines = {
    feed:["배고파… 먹이 좀 줄래?","꼬르륵… 나 지금 배고파!","조금만 챙겨주면 금방 기분 좋아져!"],
    pet:["나 좀 쓰다듬어 줄래?","같이 놀아주면 기분이 좋아질 것 같아!","조금 외로워… 한번 만져줘!"]
  };

  function randomFrom(arr){return arr[Math.floor(Math.random()*arr.length)]}
  function clamp(n){return Math.max(0,Math.min(100,Math.round(n)))}
  function saveState(){localStorage.setItem("tama-state-pwa",JSON.stringify({hunger:state.hunger,mood:state.mood,bond:state.bond}))}
  function vibrate(pattern=[180,90,220]){if(navigator.vibrate) navigator.vibrate(pattern)}
  function updateClock(){clock.textContent = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}
  setInterval(updateClock,1000); updateClock();

  async function registerSW(){
    if (!("serviceWorker" in navigator)) return null;
    const reg = await navigator.serviceWorker.register("/sw.js");
    return reg;
  }

  function syncUI(){
    hungerValue.textContent=state.hunger; moodValue.textContent=state.mood; bondValue.textContent=state.bond;
    if(state.rupture){renderFace(faces.blank); requestHint.textContent="현재 요청 없음"; return}
    if(Date.now()<state.happyUntil) renderFace(faces.happy);
    else if(state.mood>=60) renderFace(faces.happy);
    else if(state.mood>=35) renderFace(faces.neutral);
    else renderFace(faces.sad);
    requestHint.textContent = state.activeRequest ? `현재 요청: ${state.activeRequest==="feed"?"먹이 주기":"쓰다듬기"}` : "현재 요청 없음";
  }

  function showHeart(){heart.classList.add("show");setTimeout(()=>heart.classList.remove("show"),850)}
  function showHappyReaction(text){if(state.rupture)return ruptureResponse();state.happyUntil=Date.now()+2200;message.textContent=text;message.classList.remove("rupture");showHeart();syncUI();setTimeout(syncUI,2300)}

  function makeRequest(){
    if(state.rupture) return;
    const type=Math.random()<.5?"feed":"pet"; state.activeRequest=type;
    if(type==="feed") state.hunger=clamp(state.hunger+10); else state.mood=clamp(state.mood-7);
    message.textContent=randomFrom(requestLines[type]); message.classList.remove("rupture"); syncUI();
    pixelWrap.classList.add("shake"); setTimeout(()=>pixelWrap.classList.remove("shake"),700);
    vibrate([220,120,220,120,300]); saveState();
  }

  function feed(){if(state.rupture)return ruptureResponse();state.hunger=clamp(state.hunger-30);state.mood=clamp(state.mood+12);state.bond=clamp(state.bond+9);state.activeRequest=null;showHappyReaction("맛있어! 챙겨줘서 고마워 ♥");vibrate([70,50,70]);saveState()}
  function pet(){if(state.rupture)return ruptureResponse();state.mood=clamp(state.mood+20);state.hunger=clamp(state.hunger+2);state.bond=clamp(state.bond+8);state.activeRequest=null;showHappyReaction("기분 좋아! 같이 있어줘서 고마워 ♥");vibrate([70,50,70]);saveState()}
  function ruptureResponse(){message.textContent="...";message.classList.add("rupture");requestHint.textContent="요청 없음";renderFace(faces.blank)}

  function enterRupture(){
    if(state.rupture)return;
    state.rupture=true; state.activeRequest=null;
    clearInterval(state.requestTimer); clearInterval(state.decayTimer); clearInterval(state.localNotifyTimer);
    title.textContent="낯설어진 다마고치"; message.textContent="아무 요청도 하지 않는다."; message.classList.add("rupture");
    note.textContent="같은 외형이지만, 더 이상 먹이나 쓰다듬기를 요청하지 않습니다."; note.classList.add("rupture");
    stopServerPush();
    vibrate([400]); syncUI();
  }

  async function showLocalNotification(){
    if(state.rupture || Notification.permission !== "granted") return;
    const body = Math.random()<.5 ? "배고파… 먹이 좀 줄래?" : "나 좀 쓰다듬어 줄래?";
    const reg = await navigator.serviceWorker.ready;
    reg.active?.postMessage({type:"SHOW_NOTIFICATION", payload:{title:"동행 다마고치", body, url:"/"}});
  }

  function startLocalNotifications(){
    clearInterval(state.localNotifyTimer);
    state.localNotifyTimer = setInterval(showLocalNotification, (CONFIG.LOCAL_NOTIFICATION_INTERVAL_SECONDS || 30) * 1000);
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map((char) => char.charCodeAt(0)));
  }

  async function enableNotifications(){
    const permission = await Notification.requestPermission();
    if(permission !== "granted"){
      note.textContent="알림이 허용되지 않았습니다. 브라우저 설정에서 알림을 허용해야 요청 알림을 받을 수 있습니다.";
      return;
    }
    note.textContent="알림이 허용되었습니다. 서버 설정이 없으면 로컬 알림으로 작동합니다.";
    startLocalNotifications();
    await subscribeServerPush();
    await showLocalNotification();
  }

  async function subscribeServerPush(){
    if(!CONFIG.API_BASE_URL || !CONFIG.VAPID_PUBLIC_KEY) return;
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(CONFIG.VAPID_PUBLIC_KEY)
    });
    await fetch(CONFIG.API_BASE_URL + "/subscribe", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId:getUserId(), subscription:sub})
    });
    if(startPush) await startServerPush();
  }

  async function startServerPush(){
    if(!CONFIG.API_BASE_URL) return;
    await fetch(CONFIG.API_BASE_URL + "/start", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId:getUserId(), intervalSeconds:30})
    });
  }

  async function stopServerPush(){
    if(!CONFIG.API_BASE_URL) return;
    try{
      await fetch(CONFIG.API_BASE_URL + "/stop", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId:getUserId()})
      });
    }catch(e){}
  }

  async function scheduleServerRupture(seconds){
    if(!CONFIG.API_BASE_URL) return false;
    try{
      await fetch(CONFIG.API_BASE_URL + "/rupture-after", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId:getUserId(), seconds})
      });
      return true;
    }catch(e){return false}
  }

  let deferredPrompt=null;
  window.addEventListener("beforeinstallprompt",(e)=>{e.preventDefault();deferredPrompt=e;installBtn.disabled=false;});
  installBtn.addEventListener("click", async()=>{ if(deferredPrompt){deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null;} else {note.textContent="브라우저 메뉴에서 ‘홈 화면에 추가’ 또는 ‘앱 설치’를 선택하세요.";} });
  notifyBtn.addEventListener("click", enableNotifications);

  feedBtn.addEventListener("click",feed); petBtn.addEventListener("click",pet);
  document.body.addEventListener("pointerdown",()=>vibrate([35]),{once:true});

  (async function init(){
    await registerSW();
    if(Notification.permission === "granted") startLocalNotifications();

    if(immediateRupture){ enterRupture(); return; }
    if(stopAfterParam !== null){
      const seconds = Math.max(1, Number(stopAfterParam) || 30);
      const serverOk = await scheduleServerRupture(seconds);
      note.textContent = `${seconds}초 뒤 요청이 멈춥니다.` + (serverOk ? " 서버 푸시도 중단됩니다." : " 현재 기기에서는 로컬 상태로 중단됩니다.");
      setTimeout(enterRupture, seconds*1000);
    }

    syncUI();
    setTimeout(makeRequest,2500);
    state.requestTimer=setInterval(makeRequest,(CONFIG.REQUEST_INTERVAL_SECONDS||12)*1000);
    state.decayTimer=setInterval(()=>{if(state.rupture)return;state.hunger=clamp(state.hunger+4);state.mood=clamp(state.mood-3);saveState();syncUI()},8000);
  })();
</script>
</body>
</html>
